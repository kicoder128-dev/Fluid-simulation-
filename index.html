<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hydro-Logic: Fluid Automation Puzzle</title>
    <style>
        :root {
            --bg: #0a0e27;
            --panel: #111640;
            --highlight: #ff6b6b;
            --text: #e8e8f0;
            --gold: #ffd93d;
            --blue-glow: #4a90d9;
            --red-glow: #ff4757;
            --purple-glow: #a855f7;
            --green-glow: #22c55e;
            --cell-bg: #1a1f3a;
            --grid-border: #2a2f4a;
            --success: #22c55e;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(74, 144, 217, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(255, 71, 87, 0.06) 0%, transparent 50%),
                linear-gradient(180deg, #0a0e27 0%, #0d1235 50%, #0a0e27 100%);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                radial-gradient(2px 2px at 20% 30%, rgba(74, 144, 217, 0.3), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(255, 71, 87, 0.3), transparent),
                radial-gradient(2px 2px at 60% 20%, rgba(168, 85, 247, 0.3), transparent),
                radial-gradient(2px 2px at 80% 60%, rgba(34, 197, 94, 0.3), transparent),
                radial-gradient(1px 1px at 10% 80%, rgba(255, 217, 61, 0.3), transparent),
                radial-gradient(1px 1px at 90% 40%, rgba(74, 144, 217, 0.3), transparent),
                radial-gradient(1px 1px at 50% 10%, rgba(255, 71, 87, 0.3), transparent),
                radial-gradient(1px 1px at 30% 90%, rgba(168, 85, 247, 0.3), transparent);
            pointer-events: none;
            z-index: 0;
            animation: particleFloat 20s ease-in-out infinite;
        }

        @keyframes particleFloat {
            0%,
            100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }

        .container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
            padding: 15px;
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 950px;
        }

        .game-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
            min-width: 320px;
            max-width: 550px;
        }

        .game-title {
            text-align: center;
            font-size: 1.8em;
            font-weight: 700;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #4a90d9, #a855f7, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: -4px;
        }
        .game-subtitle {
            text-align: center;
            font-size: 0.7em;
            letter-spacing: 4px;
            color: #5a6080;
            text-transform: uppercase;
        }

        .grid-container {
            position: relative;
            background: #0d1125;
            border: 2px solid var(--grid-border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow:
                0 0 40px rgba(74, 144, 217, 0.1),
                0 0 80px rgba(168, 85, 247, 0.05),
                inset 0 0 40px rgba(0, 0, 0, 0.3);
        }
        .grid-container:hover {
            box-shadow:
                0 0 50px rgba(74, 144, 217, 0.15),
                0 0 100px rgba(168, 85, 247, 0.08),
                inset 0 0 40px rgba(0, 0, 0, 0.3);
        }

        canvas {
            display: block;
            cursor: crosshair;
            width: 100%;
            height: auto;
        }

        .status-bar {
            background: #0d1125;
            border: 1px solid var(--grid-border);
            border-radius: 10px;
            padding: 12px 16px;
            text-align: center;
            font-size: 0.9em;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }
        .status-bar.success {
            background: #0a1a0f;
            border-color: var(--success);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
            animation: successPulse 2s infinite;
        }
        .status-bar.error {
            background: #1a0a0a;
            border-color: var(--error);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
            animation: errorShake 0.5s ease-in-out;
        }
        @keyframes successPulse {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
            }
            50% {
                box-shadow: 0 0 35px rgba(34, 197, 94, 0.4);
            }
        }
        @keyframes errorShake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-5px);
            }
            75% {
                transform: translateX(5px);
            }
        }

        .panel {
            background: var(--panel);
            border-radius: 16px;
            padding: 20px;
            width: 320px;
            flex-shrink: 0;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 30px rgba(74, 144, 217, 0.05);
            border: 1px solid #1e2450;
            position: relative;
            overflow-y: auto;
            max-height: 90vh;
        }
        .panel::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(74, 144, 217, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(168, 85, 247, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #1e2450;
            position: relative;
            z-index: 1;
        }
        .panel-icon {
            width: 40px;
            height: 40px;
            min-width: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, #4a90d9, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
        }
        .panel-title {
            font-size: 1.2em;
            font-weight: 700;
            letter-spacing: 2px;
            color: #c8c8e0;
            white-space: nowrap;
        }

        .level-badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(255, 217, 61, 0.15), rgba(255, 107, 107, 0.1));
            border: 1px solid rgba(255, 217, 61, 0.3);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.75em;
            color: var(--gold);
            letter-spacing: 2px;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .level-info-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 14px;
            border: 1px solid #1e2450;
            position: relative;
            z-index: 1;
        }
        .level-info-card h3 {
            color: #e0e0f0;
            margin-bottom: 6px;
            font-size: 0.95em;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .level-info-card p {
            font-size: 0.82em;
            color: #9090b0;
            line-height: 1.6;
            margin: 0;
        }
        .level-info-card .hint {
            font-size: 0.72em;
            color: #6a6a8a;
            font-style: italic;
            margin-top: 6px;
        }

        .section-label {
            font-size: 0.7em;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #6a6a8a;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .tool-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            position: relative;
            z-index: 1;
        }
        .tool-btn {
            padding: 10px 8px;
            border: 1.5px solid #2a2a50;
            background: rgba(20, 20, 50, 0.6);
            color: #b0b0d0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.75em;
            font-family: inherit;
            transition: all 0.25s;
            white-space: nowrap;
            flex: 1 1 auto;
            min-width: 52px;
            text-align: center;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .tool-btn .tool-emoji {
            font-size: 1.1em;
            flex-shrink: 0;
        }
        .tool-btn .tool-label {
            font-size: 0.9em;
        }
        .tool-btn:hover {
            border-color: #4a4a70;
            background: rgba(30, 30, 60, 0.8);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .tool-btn:active {
            transform: scale(0.96);
        }
        .tool-btn.active {
            border-color: var(--highlight);
            background: rgba(255, 107, 107, 0.15);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.25);
            font-weight: 600;
        }
        .tool-btn.delete-btn {
            border-color: #5a2020;
            color: #ff6b6b;
        }
        .tool-btn.delete-btn.active {
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.2);
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.35);
        }
        .tool-btn.special-btn {
            border-color: #4a2080;
            color: #c084fc;
        }
        .tool-btn.special-btn.active {
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.2);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.35);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85em;
            font-family: inherit;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.25s;
            width: 100%;
            margin-top: 6px;
            position: relative;
            z-index: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-run {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3);
            font-size: 0.9em;
        }
        .btn-run:hover {
            box-shadow: 0 6px 25px rgba(34, 197, 94, 0.45);
            transform: translateY(-2px);
        }
        .btn-run.running {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            animation: runPulse 1s infinite;
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4);
        }
        @keyframes runPulse {
            0%,
            100% {
                box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4);
            }
            50% {
                box-shadow: 0 4px 35px rgba(239, 68, 68, 0.7);
            }
        }
        .btn-secondary {
            background: rgba(40, 40, 70, 0.6);
            color: #b0b0d0;
            border: 1px solid #2a2a50;
            backdrop-filter: blur(5px);
        }
        .btn-secondary:hover {
            background: rgba(50, 50, 80, 0.8);
            border-color: #4a4a70;
        }
        .nav-buttons {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            position: relative;
            z-index: 1;
        }
        .nav-buttons .btn {
            flex: 1;
            margin-top: 0;
        }

        .legend-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 0.7em;
            color: #8080a0;
            margin-top: 12px;
            position: relative;
            z-index: 1;
            justify-content: center;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.02);
            padding: 4px 8px;
            border-radius: 12px;
            border: 1px solid #1e2450;
        }
        .legend-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a0a0a;
            border: 1px solid #ef4444;
            color: #ff6b6b;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 600;
            letter-spacing: 1px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
            animation: toastIn 0.3s ease-out, toastOut 0.3s ease-in 2.5s forwards;
            font-size: 0.9em;
            text-align: center;
            max-width: 90vw;
        }
        .toast.success-toast {
            background: #0a1a0f;
            border-color: #22c55e;
            color: #22c55e;
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.3);
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
        }

        /* Tooltip */
        .tooltip-trigger {
            position: relative;
            cursor: help;
        }
        .tooltip-trigger:hover .tooltip-text {
            display: block;
        }
        .tooltip-text {
            display: none;
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.7em;
            white-space: nowrap;
            z-index: 200;
            pointer-events: none;
            margin-bottom: 4px;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
                padding: 10px;
                gap: 12px;
            }
            .panel {
                width: 100%;
                max-width: 500px;
                padding: 16px;
                max-height: none;
            }
            .game-area {
                width: 100%;
                max-width: 500px;
                min-width: unset;
            }
            .game-title {
                font-size: 1.3em;
            }
            .tool-btn {
                padding: 10px 6px;
                font-size: 0.7em;
                border-radius: 8px;
            }
            .btn {
                padding: 14px 16px;
                font-size: 0.85em;
            }
        }
        @media (max-width: 400px) {
            .container {
                padding: 6px;
                gap: 8px;
            }
            .panel {
                padding: 12px;
            }
            .tool-btn {
                padding: 8px 4px;
                font-size: 0.65em;
                border-radius: 7px;
            }
            .game-title {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-area">
            <div class="game-title">⚗️ HYDRO-LOGIC</div>
            <div class="game-subtitle">Fluid Automation Puzzle</div>
            <div class="grid-container">
                <canvas id="gridCanvas"></canvas>
            </div>
            <div class="status-bar" id="statusBar">
                <span class="status-icon">💡</span>
                <span class="status-text" id="statusText">Click grid to place components</span>
            </div>
        </div>

        <div class="panel" id="panel">
            <div class="panel-header">
                <div class="panel-icon">⚙️</div>
                <div class="panel-title">CONTROLS</div>
            </div>
            <div class="level-badge" id="levelBadge">LEVEL 1</div>
            <div class="level-info-card" id="levelInfo">
                <h3>🔵 Simple Route</h3>
                <p>Connect Blue Input → Blue Output</p>
            </div>
            <div class="section-label">🔧 Tools (keys 1-6, D, X)</div>
            <div class="tool-buttons" id="toolButtons">
                <button class="tool-btn active" data-tool="tube"><span class="tool-emoji">🔗</span><span class="tool-label">Tube</span></button>
                <button class="tool-btn" data-tool="valve"><span class="tool-emoji">🚦</span><span class="tool-label">Valve</span></button>
                <button class="tool-btn" data-tool="mixer"><span class="tool-emoji">⚗️</span><span class="tool-label">Mixer</span></button>
                <button class="tool-btn" data-tool="delay"><span class="tool-emoji">⏳</span><span class="tool-label">Delay</span></button>
                <button class="tool-btn special-btn" data-tool="splitter"><span class="tool-emoji">⑂</span><span class="tool-label">Split</span></button>
                <button class="tool-btn special-btn" data-tool="sensor"><span class="tool-emoji">👁️</span><span class="tool-label">Sensor</span></button>
                <button class="tool-btn delete-btn" data-tool="delete"><span class="tool-emoji">🗑️</span><span class="tool-label">Del</span></button>
            </div>
            <button class="btn btn-run" id="btnRun">▶ RUN SIMULATION</button>
            <button class="btn btn-secondary" id="btnReset">🔄 Clear Grid</button>
            <div class="nav-buttons">
                <button class="btn btn-secondary" id="btnPrev">◀ Prev</button>
                <button class="btn btn-secondary" id="btnNext">Next ▶</button>
            </div>
            <div class="legend-row">
                <span class="legend-item"><span class="legend-dot" style="background:#4a90d9;box-shadow:0 0 6px #4a90d9;"></span>Blue</span>
                <span class="legend-item"><span class="legend-dot" style="background:#ff4757;box-shadow:0 0 6px #ff4757;"></span>Red</span>
                <span class="legend-item"><span class="legend-dot" style="background:#a855f7;box-shadow:0 0 6px #a855f7;"></span>Purple</span>
                <span class="legend-item"><span class="legend-dot" style="background:#22c55e;box-shadow:0 0 6px #22c55e;"></span>Green</span>
                <span class="legend-item"><span class="legend-dot" style="background:#ffd93d;box-shadow:0 0 6px #ffd93d;"></span>Yellow</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gridCanvas');
            const ctx = canvas.getContext('2d');
            const statusBar = document.getElementById('statusBar');
            const statusText = document.getElementById('statusText');
            const statusIcon = document.querySelector('.status-icon');
            const btnRun = document.getElementById('btnRun');
            const btnReset = document.getElementById('btnReset');
            const btnPrev = document.getElementById('btnPrev');
            const btnNext = document.getElementById('btnNext');
            const levelInfo = document.getElementById('levelInfo');
            const levelBadge = document.getElementById('levelBadge');
            const toolButtons = document.getElementById('toolButtons');

            const CELL_SIZE = 40;
            const GRID_COLS = 12;
            const GRID_ROWS = 8;
            canvas.width = GRID_COLS * CELL_SIZE;
            canvas.height = GRID_ROWS * CELL_SIZE;

            let currentTool = 'tube';
            let isRunning = false;
            let simulationInterval = null;
            let currentLevelIndex = 0;
            let grid = [];
            let fluidParticles = [];
            let simTick = 0;
            let winDetected = false;
            let score = 0;
            let componentsUsed = 0;

            // --- Expanded Levels ---
            const levels = [
                // === BEGINNER ===
                {
                    name: 'Simple Route',
                    difficulty: '⭐',
                    description: '🔵 Blue Input → 🔵 Blue Output<br>Connect them with tubes.',
                    hint: 'Click cells to place tubes between the diamond and circle.',
                    inputs: [{ row: 3, col: 0, color: 'blue', pressure: 'continuous' }],
                    outputs: [{ row: 3, col: 11, color: 'blue', required: 'blue' }],
                    par: 12,
                }, {
                    name: 'First Mix',
                    difficulty: '⭐',
                    description: '🔵 Blue + 🔴 Red → 🟣 Purple<br>Use a <b>Mixer</b> to combine.',
                    hint: 'Route both inputs into a Mixer, then to the output.',
                    inputs: [
                        { row: 1, col: 0, color: 'blue', pressure: 'continuous' },
                        { row: 5, col: 0, color: 'red', pressure: 'continuous' },
                    ],
                    outputs: [{ row: 3, col: 11, color: 'purple', required: 'purple' }],
                    par: 18,
                }, {
                    name: 'Keep Apart',
                    difficulty: '⭐⭐',
                    description: '🔵 Blue → Blue Output<br>🔴 Red → Red Output<br>Keep them separate!',
                    hint: 'Build two isolated paths. No mixer needed.',
                    inputs: [
                        { row: 1, col: 0, color: 'blue', pressure: 'continuous' },
                        { row: 5, col: 0, color: 'red', pressure: 'continuous' },
                    ],
                    outputs: [
                        { row: 1, col: 11, color: 'blue', required: 'blue' },
                        { row: 5, col: 11, color: 'red', required: 'red' },
                    ],
                    par: 20,
                },

                // === INTERMEDIATE ===
                {
                    name: 'Pulse Rider',
                    difficulty: '⭐⭐',
                    description: '🔵 Blue (pulses) → 🔵 Output<br>Red pulses every 2 ticks. Keep output steady!',
                    hint: 'Use a Delay Tank to buffer the intermittent flow.',
                    inputs: [{ row: 3, col: 0, color: 'blue', pressure: 'intermittent', interval: 2 }],
                    outputs: [{ row: 3, col: 11, color: 'blue', required: 'blue' }],
                    par: 14,
                }, {
                    name: 'The Purple Drop',
                    difficulty: '⭐⭐⭐',
                    description: '🔵 Blue (continuous)<br>🔴 Red (pulses every 3 ticks)<br>→ 🟣 Purple at output',
                    hint: 'Red must only reach mixer when Blue is flowing. Try a Valve on the Red line.',
                    inputs: [
                        { row: 1, col: 0, color: 'blue', pressure: 'continuous' },
                        { row: 5, col: 0, color: 'red', pressure: 'intermittent', interval: 3 },
                    ],
                    outputs: [{ row: 3, col: 11, color: 'purple', required: 'purple' }],
                    par: 22,
                }, {
                    name: 'Color Sorter',
                    difficulty: '⭐⭐⭐',
                    description: '🔵 Blue + 🔴 Red inputs<br>→ 🔵 Blue to top output<br>→ 🟣 Purple to bottom output<br>Split them correctly!',

            function showToast(message, type = 'error') {
                const existing = document.querySelector('.toast');
                if (existing) existing.remove();
                const toast = document.createElement('div');
                toast.className = 'toast' + (type === 'success' ? ' success-toast' : '');
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }

            function setStatus(type, icon, text) {
                statusBar.className = 'status-bar ' + type;
                statusIcon.textContent = icon;
                statusText.textContent = text;
            }

            function createEmptyGrid() {
                const g = [];
                for (let r = 0; r < GRID_ROWS; r++) {
                    g[r] = [];
                    for (let c = 0; c < GRID_COLS; c++) {
                        g[r][c] = null;
                    }
                }
                return g;
            }

            function setupLevel(levelIndex) {
                currentLevelIndex = levelIndex;
                const level = levels[levelIndex];
                grid = createEmptyGrid();
                stopSimulation();
                fluidParticles = [];
                simTick = 0;
                winDetected = false;
                componentsUsed = 0;
                setStatus('info', '💡', 'Click grid to place components');
                levelBadge.textContent = 'LEVEL ' + (levelIndex + 1) + ' ' + level.difficulty;

                level.inputs.forEach(inp => {
                    grid[inp.row][inp.col] = {
                        type: 'input',
                        color: inp.color,
                        pressure: inp.pressure,
                        interval: inp.interval || 2,
                        tickCounter: 0,
                        active: inp.pressure === 'continuous',
                        connections: getEdgeConnections(inp.row, inp.col),
                    };
                });
                level.outputs.forEach(out => {
                    grid[out.row][out.col] = {
                        type: 'output',
                        color: out.required,
                        required: out.required,
                        received: null,
                        receivedHistory: [],
                        connections: getEdgeConnections(out.row, out.col),
                    };
                });

                const hintHtml = level.hint ? `<div class="hint">💡 ${level.hint}</div>` : '';
                const parHtml = level.par ? `<div class="hint">🎯 Par: ${level.par} components</div>` : '';
                levelInfo.innerHTML =
                    `<h3>${level.difficulty} ${level.name}</h3><p>${level.description.replace(/\n/g, '<br>')}</p>${hintHtml}${parHtml}`;
                updateAllConnections();
                draw();
            }

            function getEdgeConnections(row, col) {
                const conns = [];
                if (row > 0) conns.push('n');
                if (row < GRID_ROWS - 1) conns.push('s');
                if (col > 0) conns.push('w');
                if (col < GRID_COLS - 1) conns.push('e');
                return conns;
            }

            function resetGrid() { setupLevel(currentLevelIndex); }

            // --- Drawing ---
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let r = 0; r < GRID_ROWS; r++) {
                    for (let c = 0; c < GRID_COLS; c++) {
                        const x = c * CELL_SIZE;
                        const y = r * CELL_SIZE;
                        ctx.fillStyle = (r + c) % 2 === 0 ? '#0f1430' : '#111638';
                        ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
                    }
                }
                ctx.strokeStyle = '#1a1f3a';
                ctx.lineWidth = 0.5;
                for (let r = 0; r <= GRID_ROWS; r++) {
                    ctx.beginPath();
                    ctx.moveTo(0, r * CELL_SIZE);
                    ctx.lineTo(canvas.width, r * CELL_SIZE);
                    ctx.stroke();
                }
                for (let c = 0; c <= GRID_COLS; c++) {
                    ctx.beginPath();
                    ctx.moveTo(c * CELL_SIZE, 0);
                    ctx.lineTo(c * CELL_SIZE, canvas.height);
                    ctx.stroke();
                }
                for (let r = 0; r < GRID_ROWS; r++) {
                    for (let c = 0; c < GRID_COLS; c++) {
                        const cell = grid[r][c];
                        const x = c * CELL_SIZE;
                        const y = r * CELL_SIZE;
                        if (!cell) continue;
                        if (cell.type === 'input') drawInputOutput(x, y, cell.color, true);
                        else if (cell.type === 'output') drawInputOutput(x, y, cell.color, false);
                        else if (cell.type === 'tube') drawTube(x, y, cell);
                        else if (cell.type === 'valve') drawValve(x, y, cell);
                        else if (cell.type === 'mixer') drawMixer(x, y, cell);
                        else if (cell.type === 'delay') drawDelay(x, y, cell);
                        else if (cell.type === 'splitter') drawSplitter(x, y, cell);
                        else if (cell.type === 'sensor') drawSensor(x, y, cell);
                    }
                }
                if (isRunning && fluidParticles.length > 0) {
                    fluidParticles.forEach(p => {
                        const px = p.col * CELL_SIZE + CELL_SIZE / 2;
                        const py = p.row * CELL_SIZE + CELL_SIZE / 2;
                        const glow = ctx.createRadialGradient(px, py, 2, px, py, 10);
                        glow.addColorStop(0, getColorHex(p.color));
                        glow.addColorStop(1, 'transparent');
                        ctx.fillStyle = glow;
                        ctx.beginPath();
                        ctx.arc(px, py, 10, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#fff';
                        ctx.globalAlpha = 0.9;
                        ctx.beginPath();
                        ctx.arc(px, py, 4, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.globalAlpha = 1;
                    });
                }
            }

            function drawInputOutput(x, y, color, isInput) {
                const cx = x + CELL_SIZE / 2;
                const cy = y + CELL_SIZE / 2;
                const r = 14;
                const colHex = getColorHex(color);
                const glow = ctx.createRadialGradient(cx, cy, r * 0.5, cx, cy, r * 1.4);
                glow.addColorStop(0, colHex + '60');
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(cx, cy, r * 1.4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#0d1125';
                ctx.strokeStyle = colHex;
                ctx.lineWidth = 2.5;
                ctx.shadowColor = colHex;
                ctx.shadowBlur = 8;
                ctx.beginPath();
                if (isInput) {
                    ctx.moveTo(cx, cy - r);
                    ctx.lineTo(cx + r, cy);
                    ctx.lineTo(cx, cy + r);
                    ctx.lineTo(cx - r, cy);
                    ctx.closePath();
                } else {
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                }
                ctx.fill();
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.fillStyle = colHex;
                ctx.globalAlpha = 0.7;
                ctx.beginPath();
                if (isInput) {
                    ctx.moveTo(cx, cy - r + 5);
                    ctx.lineTo(cx + r - 5, cy);
                    ctx.lineTo(cx, cy + r - 5);
                    ctx.lineTo(cx - r + 5, cy);
                    ctx.closePath();
                } else {
                    ctx.arc(cx, cy, r - 4, 0, Math.PI * 2);
                }
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 9px "Segoe UI", monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(isInput ? 'IN' : 'OUT', cx, cy);
            }

            function drawTube(x, y, cell) {
                const cx = x + CELL_SIZE / 2;
                const cy = y + CELL_SIZE / 2;
                const conns = cell.connections || [];
                conns.forEach(dir => {
                    const grad = ctx.createLinearGradient(cx, cy,
                        dir === 'e' ? x + CELL_SIZE : dir === 'w' ? x : cx,
                        dir === 's' ? y + CELL_SIZE : dir === 'n' ? y : cy);
                    grad.addColorStop(0, '#3a5a80');
                    grad.addColorStop(1, '#2a4a6a');
                    ctx.strokeStyle = grad;
                    ctx.lineWidth = 7;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    if (dir === 'n') ctx.lineTo(cx, y - 3);
                    if (dir === 's') ctx.lineTo(cx, y + CELL_SIZE + 3);
                    if (dir === 'e') ctx.lineTo(x + CELL_SIZE + 3, cy);
                    if (dir === 'w') ctx.lineTo(x - 3, cy);
                    ctx.stroke();
                });
                const hubGrad = ctx.createRadialGradient(cx, cy, 2, cx, cy, 6);
                hubGrad.addColorStop(0, '#5a8ab0');
                hubGrad.addColorStop(1, '#2a4a6a');
                ctx.fillStyle = hubGrad;
                ctx.beginPath();
                ctx.arc(cx, cy, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#4a7a9a';
                ctx.lineWidth = 1;
                ctx.stroke();
                if (isRunning && cell._hasFluid) {
                    const col = getColorHex(cell._fluidColor || 'blue');
                    const glow = ctx.createRadialGradient(cx, cy, 1, cx, cy, 5);
                    glow.addColorStop(0, '#fff');
                    glow.addColorStop(0.5, col);
                    glow.addColorStop(1, 'transparent');
                    ctx.fillStyle = glow;
                    ctx.beginPath();
                    ctx.arc(cx, cy, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function drawValve(x, y, cell) {
                const cx = x + CELL_SIZE / 2;
                const cy = y + CELL_SIZE / 2;
                const isOpen = cell.state === 'open';
                ctx.fillStyle = '#1a1020';
                ctx.strokeStyle = isOpen ? '#22c55e' : '#ef4444';
                ctx.lineWidth = 2;
                ctx.shadowColor = isOpen ? '#22c55e' : '#ef4444';
                ctx.shadowBlur = 6;
                roundRect(x + 5, y + 5, CELL_SIZE - 10, CELL_SIZE - 10, 6);
                ctx.fill();
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.fillStyle = isOpen ? '#22c55e' : '#ef4444';
                ctx.beginPath();
                ctx.moveTo(cx, cy - 9);
                ctx.lineTo(cx + 7, cy + 5);
                ctx.lineTo(cx - 7, cy + 5);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 8px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(isOpen ? 'ON' : 'OFF', cx, cy + 14);
            }

            function drawMixer(x, y, cell) {
                const cx = x + CELL_SIZE / 2;
                const cy = y + CELL_SIZE / 2;
                const glow = ctx.createRadialGradient(cx, cy, 8, cx, cy, 18);
                glow.addColorStop(0, '#a855f740');
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(cx, cy, 18, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#151028';
                ctx.strokeStyle = '#a855f7';
                ctx.lineWidth = 2;
                ctx.shadowColor = '#a855f7';
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(cx, cy, 13, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#c8c8e0';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(cx - 5, cy);
                ctx.lineTo(cx + 5, cy);
                ctx.moveTo(cx, cy - 5);
                ctx.lineTo(cx, cy + 5);
                ctx.stroke();
                ctx.fillStyle = '#c8c8e0';
                ctx.font = 'bold 6px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('MIX', cx, cy + 17);
            }

            function drawDelay(x, y, cell) {
                const cx = x + CELL_SIZE / 2;
                const cy = y + CELL_SIZE / 2;
                ctx.fillStyle = '#101a18';
                ctx.strokeStyle = '#ffd93d';
                ctx.lineWidth = 2;
                ctx.shadowColor = '#ffd93d';
                ctx.shadowBlur = 6;
                roundRect(x + 4, y + 4, CELL_SIZE - 8, CELL_SIZE - 8, 5);
                ctx.fill();
                ctx.stroke();
                ctx.shadowBlur = 0;
                const capacity = cell.capacity || 3;
                const stored = cell.stored || 0;
                const fillH = (stored / capacity) * (CELL_SIZE - 14);
                const grad = ctx.createLinearGradient(x, y + CELL_SIZE - 10, x, y + CELL_SIZE - 10 - fillH);
                grad.addColorStop(0, '#ffd93d');
                grad.addColorStop(1, '#ff9500');
                ctx.fillStyle = grad;
                ctx.globalAlpha = 0.7;
                ctx.fillRect(x + 9, y + CELL_SIZE - 10 - fillH, CELL_SIZE - 18, fillH);
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 9px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`${stored}/${capacity}`, cx, cy);
            }

            function drawSplitter(x, y, cell) {
                const cx = x + CELL_SIZE / 2;
                const cy = y + CELL_SIZE / 2;
                ctx.fillStyle = '#101828';
                ctx.strokeStyle = '#60a5fa';
                ctx.lineWidth = 2;
                ctx.shadowColor = '#60a5fa';
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.moveTo(cx, cy - 12);
                ctx.lineTo(cx + 10, cy + 8);
                ctx.lineTo(cx - 10, cy + 8);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 6px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('SPLIT', cx, cy + 2);
            }

            function drawSensor(x, y, cell) {
                const cx = x + CELL_SIZE / 2;
                const cy = y + CELL_SIZE / 2;
                const glow = ctx.createRadialGradient(cx, cy, 4, cx, cy, 14);
                glow.addColorStop(0, '#fbbf2440');
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(cx, cy, 14, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#1a1028';
                ctx.strokeStyle = '#fbbf24';
                ctx.lineWidth = 2;
                ctx.shadowColor = '#fbbf24';
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(cx, cy, 11, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 6px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('SENS', cx, cy);
                if (cell._detected) {
                    ctx.fillStyle = '#fbbf24';
                    ctx.globalAlpha = 0.8;
                    ctx.beginPath();
                    ctx.arc(cx, cy, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }

            function roundRect(x, y, w, h, r) {
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + w - r, y);
                ctx.arcTo(x + w, y, x + w, y + r, r);
                ctx.lineTo(x + w, y + h - r);
                ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
                ctx.lineTo(x + r, y + h);
                ctx.arcTo(x, y + h, x, y + h - r, r);
                ctx.lineTo(x, y + r);
                ctx.arcTo(x, y, x + r, y, r);
                ctx.closePath();
            }

            function getColorHex(color) {
                const map = {
                    'blue': '#4a90d9',
                    'red': '#ff4757',
                    'purple': '#a855f7',
                    'green': '#22c55e',
                    'yellow': '#ffd93d',
                    'orange': '#f97316',
                };
                return map[color] || '#888';
            }

            function mixColors(c1, c2) {
                if (!c1 || !c2) return c1 || c2;
                const pair = [c1, c2].sort().join(',');
                const mixes = {
                    'blue,red': 'purple',
                    'blue,yellow': 'green',
                    'red,yellow': 'orange',
                    'blue,green': 'cyan',
                    'red,green': 'brown',
                };
                return mixes[pair] || c1;
            }

            // --- Mouse/Touch ---
            function getGridFromEvent(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const x = (clientX - rect.left) * scaleX;
                const y = (clientY - rect.top) * scaleY;
                return { row: Math.floor(y / CELL_SIZE), col: Math.floor(x / CELL_SIZE) };
            }

            function handleCanvasClick(e) {
                if (isRunning) return;
                e.preventDefault();
                const { row, col } = getGridFromEvent(e);
                if (col < 0 || col >= GRID_COLS || row < 0 || row >= GRID_ROWS) return;
                const cell = grid[row][col];
                if (cell && (cell.type === 'input' || cell.type === 'output')) return;

                const toolMap = {
                    'tube': { type: 'tube', connections: [] },
                    'valve': { type: 'valve', state: 'open', connections: [] },
                    'mixer': { type: 'mixer', connections: [] },
                    'delay': { type: 'delay', capacity: 3, stored: 0, connections: [] },
                    'splitter': { type: 'splitter', connections: [] },
                    'sensor': { type: 'sensor', connections: [], _detected: false },
                };

                if (currentTool === 'delete') {
                    grid[row][col] = null;
                } else if (toolMap[currentTool]) {
                    const existing = grid[row][col];
                    if (existing && existing.type === currentTool) {
                        grid[row][col] = null;
                    } else {
                        grid[row][col] = JSON.parse(JSON.stringify(toolMap[currentTool]));
                        if (currentTool !== 'tube') componentsUsed++;
                    }
                }
                updateAllConnections();
                draw();
            }

            canvas.addEventListener('click', handleCanvasClick);
            canvas.addEventListener('touchstart', function(e) {
                if (isRunning) return;
                e.preventDefault();
                handleCanvasClick(e);
            }, { passive: false });

            // --- Connection Logic ---
            function updateAllConnections() {
                for (let r = 0; r < GRID_ROWS; r++) {
                    for (let c = 0; c < GRID_COLS; c++) {
                        const cell = grid[r][c];
                        if (cell && cell.type !== 'input' && cell.type !== 'output') {
                            cell.connections = [];
                        }
                    }
                }
                const visited = new Set();
                const connectableTypes = ['input', 'output', 'tube', 'valve', 'mixer', 'delay', 'splitter', 'sensor'];
                for (let r = 0; r < GRID_ROWS; r++) {
                    for (let c = 0; c < GRID_COLS; c++) {
                        const key = `${r},${c}`;
                        if (visited.has(key)) continue;
                        const cell = grid[r][c];
                        if (!cell || !connectableTypes.includes(cell.type)) continue;
                        const queue = [{ r, c }];
                        const compVisited = new Set();
                        compVisited.add(key);
                        while (queue.length > 0) {
                            const { r: cr, c: cc } = queue.shift();
                            const dirs = [{ dr: -1, dc: 0, dir: 'n', opp: 's' }, { dr: 1, dc: 0, dir: 's', opp: 'n' }, { dr: 0,
                                dc: -1, dir: 'w', opp: 'e' }, { dr: 0, dc: 1, dir: 'e', opp: 'w' }];
                            for (const { dr, dc, dir, opp } of dirs) {
                                const nr = cr + dr;
                                const nc = cc + dc;
                                if (nr >= 0 && nr < GRID_ROWS && nc >= 0 && nc < GRID_COLS) {
                                    const nkey = `${nr},${nc}`;
                                    if (compVisited.has(nkey)) continue;
                                    const ncell = grid[nr][nc];
                                    if (ncell && connectableTypes.includes(ncell.type)) {
                                        compVisited.add(nkey);
                                        queue.push({ r: nr, c: nc });
                                        if (grid[cr][cc].connections && !grid[cr][cc].connections.includes(dir))
                                            grid[cr][cc].connections.push(dir);
                                        if (grid[nr][nc].connections && !grid[nr][nc].connections.includes(opp))
                                            grid[nr][nc].connections.push(opp);
                                    }
                                }
                            }
                        }
                        for (const k of compVisited) visited.add(k);
                    }
                }
            }

            // --- Simulation ---
            function toggleRun() { if (isRunning) stopSimulation();
                else startSimulation(); }

            function startSimulation() {
                updateAllConnections();
                isRunning = true;
                winDetected = false;
                btnRun.textContent = '⏹ STOP';
                btnRun.classList.add('running');
                setStatus('info', '🔬', 'Simulating...');
                resetSimulationState();
                fluidParticles = [];
                simTick = 0;
                simulationInterval = setInterval(simulateTick, 400);
            }

            function stopSimulation() {
                isRunning = false;
                if (simulationInterval) { clearInterval(simulationInterval);
                    simulationInterval = null; }
                btnRun.textContent = '▶ RUN';
                btnRun.classList.remove('running');
                fluidParticles = [];
                if (!winDetected) checkWinCondition();
                draw();
            }

            function resetSimulationState() {
                for (let r = 0; r < GRID_ROWS; r++) {
                    for (let c = 0; c < GRID_COLS; c++) {
                        const cell = grid[r][c];
                        if (cell) {
                            cell._hasFluid = false;
                            cell._fluidColor = null;
                            if (cell.type === 'delay') cell.stored = 0;
                            if (cell.type === 'valve') cell.state = 'open';
                            if (cell.type === 'output') { cell.received = null;
                                cell.receivedHistory = []; }
                            if (cell.type === 'sensor') cell._detected = false;
                        }
                    }
                }
            }

            function simulateTick() {
                if (winDetected) return;
                simTick++;
                const level = levels[currentLevelIndex];

                level.inputs.forEach(inp => {
                    const cell = grid[inp.row][inp.col];
                    if (!cell) return;
                    if (inp.pressure === 'continuous') cell.active = true;
                    else {
                        cell.tickCounter = (cell.tickCounter || 0) + 1;
                        cell.active = (cell.tickCounter % (inp.interval * 2)) < inp.interval;
                    }
                });

                for (let r = 0; r < GRID_ROWS; r++) {
                    for (let c = 0; c < GRID_COLS; c++) {
                        const cell = grid[r][c];
                        if (cell && cell.type !== 'input' && cell.type !== 'output') {
                            cell._hasFluid = false;
                            cell._fluidColor = null;
                        }
                        if (cell && cell.type === 'output') cell.received = null;
                        if (cell && cell.type === 'sensor') cell._detected = false;
                    }
                }

                const newParticles = [];
                const processed = new Set();

                for (const inp of level.inputs) {
                    const cell = grid[inp.row][inp.col];
                    if (!cell || !cell.active) continue;
                    const startKey = `${inp.row},${inp.col}`;
                    if (processed.has(startKey)) continue;
                    processed.add(startKey);
                    cell._hasFluid = true;
                    cell._fluidColor = inp.color;
                    newParticles.push({ row: inp.row, col: inp.col, color: inp.color });

                    const queue = [{ r: inp.row, c: inp.col, color: inp.color }];
                    const visited = new Set();
                    visited.add(startKey);

                    while (queue.length > 0) {
                        const { r, c, color } = queue.shift();
                        const cell = grid[r][c];
                        if (!cell) continue;

                        if (cell.type === 'output') {
                            cell.received = color;
                            if (!cell.receivedHistory) cell.receivedHistory = [];
                            cell.receivedHistory.push({ tick: simTick, color });
                            newParticles.push({ row: r, col: c, color });
                            continue;
                        }
                        if (cell.type === 'valve' && cell.state === 'closed') continue;
                        if (cell.type === 'sensor') {
                            cell._detected = true;
                            cell._fluidColor = color;
                        }
                        if (cell.type === 'splitter') {
                            const conns = cell.connections || [];
                            const outDirs = conns.filter(d => {
                                const nb = getNeighbor(r, c, d);
                                return nb && !visited.has(`${nb.r},${nb.c}`);
                            });
                            outDirs.forEach(dir => {
                                const nb = getNeighbor(r, c, dir);
                                if (nb && grid[nb.r][nb.c] && grid[nb.r][nb.c].type !== 'input') {
                                    visited.add(`${nb.r},${nb.c}`);
                                    queue.push({ r: nb.r, c: nb.c, color });
                                    grid[nb.r][nb.c]._hasFluid = true;
                                    grid[nb.r][nb.c]._fluidColor = color;
                                    newParticles.push({ row: nb.r, col: nb.c, color });
                                }
                            });
                            continue;
                        }
                        if (cell.type === 'mixer') {
                            const incomingColors = [];
                            for (const dir of cell.connections) {
                                const nb = getNeighbor(r, c, dir);
                                if (nb && grid[nb.r][nb.c] && grid[nb.r][nb.c]._hasFluid && grid[nb.r][nb.c]._fluidColor)
                                    incomingColors.push(grid[nb.r][nb.c]._fluidColor);
                            }
                            const uniqueColors = [...new Set(incomingColors.filter(Boolean))];
                            if (uniqueColors.length >= 2) {
                                const mixed = mixColors(uniqueColors[0], uniqueColors[1]);
                                cell._fluidColor = mixed;
                                for (const dir of cell.connections) {
                                    const nb = getNeighbor(r, c, dir);
                                    if (nb && !visited.has(`${nb.r},${nb.c}`)) {
                                        visited.add(`${nb.r},${nb.c}`);
                                        queue.push({ r: nb.r, c: nb.c, color: mixed });
                                        if (grid[nb.r][nb.c]) { grid[nb.r][nb.c]._hasFluid = true;
                                            grid[nb.r][nb.c]._fluidColor = mixed; }
                                        newParticles.push({ row: nb.r, col: nb.c, color: mixed });
                                    }
                                }
                                continue;
                            }
                        }
                        if (cell.type === 'delay') {
                            if (cell.stored < cell.capacity) { cell.stored++;
                                cell._fluidColor = color;
                                newParticles.push({ row: r, col: c, color }); continue; }
                            cell.stored = cell.capacity;
                        }
                        for (const dir of cell.connections) {
                            const nb = getNeighbor(r, c, dir);
                            if (nb && !visited.has(`${nb.r},${nb.c}`)) {
                                const ncell = grid[nb.r][nb.c];
                                if (ncell && ncell.type !== 'input') {
                                    visited.add(`${nb.r},${nb.c}`);
                                    queue.push({ r: nb.r, c: nb.c, color: cell._fluidColor || color });
                                    ncell._hasFluid = true;
                                    ncell._fluidColor = cell._fluidColor || color;
                                    newParticles.push({ row: nb.r, col: nb.c, color: cell._fluidColor || color });
                                }
                            }
                        }
                    }
                }
                fluidParticles = newParticles;
                draw();
                if (simTick % 3 === 0) checkWinCondition();
            }

            function getNeighbor(r, c, dir) {
                switch (dir) {
                    case 'n':
                        return r > 0 ? { r: r - 1, c } : null;
                    case 's':
                        return r < GRID_ROWS - 1 ? { r: r + 1, c } : null;
                    case 'e':
                        return c < GRID_COLS - 1 ? { r, c: c + 1 } : null;
                    case 'w':
                        return c > 0 ? { r, c: c - 1 } : null;
                    default:
                        return null;
                }
            }

            function checkWinCondition() {
                if (winDetected) return;
                const level = levels[currentLevelIndex];
                let allCorrect = true;
                let anyReceived = false;
                let hasError = false;
                let errorMsg = '';

                // Special rule: alternating outputs
                if (level.specialRule === 'alternating') {
                    const out1 = grid[level.outputs[0].row][level.outputs[0].col];
                    const out2 = grid[level.outputs[1].row][level.outputs[1].col];
                    const h1 = out1.receivedHistory || [];
                    const h2 = out2.receivedHistory || [];
                    const recentTicks = Math.max(...[...h1, ...h2].map(h => h.tick), 0);
                    if (recentTicks < 6) return; // Need more data
                    const lastFew = Math.min(4, recentTicks);
                    let alternating = true;
                    for (let t = recentTicks - lastFew; t <= recentTicks; t++) {
                        const o1Has = h1.some(h => h.tick === t);
                        const o2Has = h2.some(h => h.tick === t);
                        if (o1Has === o2Has) { alternating = false; break; }
                    }
                    if (alternating && h1.length > 0 && h2.length > 0) {
                        winDetected = true;
                        setStatus('success', '✅', 'SUCCESS! Alternating pattern achieved! 🎉');
                        stopSimulation();
                        showToast('🎉 Oscillator working perfectly!', 'success');
                        return;
                    }
                    if (simTick > 15) {
                        winDetected = true;
                        setStatus('error', '⚠️', 'Outputs not alternating properly');
                        stopSimulation();
                        showToast('❌ Outputs must alternate each tick');
                        return;
                    }
                    return;
                }

                for (const out of level.outputs) {
                    const cell = grid[out.row][out.col];
                    if (!cell || !cell.received) { allCorrect = false; } else if (cell.received === out
                        .required) { anyReceived = true; } else { allCorrect = false;
                        hasError = true;
                        errorMsg = `Wrong color! Expected ${out.required}, got ${cell.received}`; }
                }

                if (allCorrect && anyReceived) {
                    winDetected = true;
                    const parMsg = level.par && componentsUsed <= level.par ?
                        ` Under par (${componentsUsed}/${level.par})!` : '';
                    setStatus('success', '✅', 'SUCCESS! Puzzle solved!' + parMsg + ' 🎉');
                    stopSimulation();
                    showToast('🎉 Puzzle Solved!' + parMsg, 'success');
                    return;
                }
                if (hasError && isRunning) {
                    winDetected = true;
                    setStatus('error', '⚠️', errorMsg);
                    stopSimulation();
                    showToast('❌ ' + errorMsg);
                    return;
                }
                if (!anyReceived && simTick > 12 && isRunning) {
                    winDetected = true;
                    setStatus('error', '🔌', 'No fluid reaching output! Check connections.');
                    stopSimulation();
                    showToast('🔌 No connection to output detected!');
                }
            }

            // --- Tool Selection ---
            toolButtons.addEventListener('click', function(e) {
                const btn = e.target.closest('.tool-btn');
                if (!btn) return;
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
            });

            btnRun.addEventListener('click', toggleRun);
            btnReset.addEventListener('click', resetGrid);
            btnPrev.addEventListener('click', () => {
                const idx = (currentLevelIndex - 1 + levels.length) % levels.length;
                setupLevel(idx);
            });
            btnNext.addEventListener('click', () => {
                const idx = (currentLevelIndex + 1) % levels.length;
                setupLevel(idx);
            });

            document.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                const keyMap = {
                    '1': 'tube',
                    '2': 'valve',
                    '3': 'mixer',
                    '4': 'delay',
                    '5': 'splitter',
                    '6': 'sensor',
                    'd': 'delete',
                    'x': 'delete'
                };
                if (keyMap[e.key.toLowerCase()]) {
                    currentTool = keyMap[e.key.toLowerCase()];
                    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                    const btn = document.querySelector(`[data-tool="${currentTool}"]`);
                    if (btn) btn.classList.add('active');
                    return;
                }
                if (e.key === ' ') { e.preventDefault();
                    toggleRun(); return; }
                if (e.key.toLowerCase() === 'r' && !isRunning) { resetGrid(); return; }
            });

            setupLevel(0);
            draw();
            console.log('⚗️ Hydro-Logic v2.0 ready!');
            console.log('  11 levels | New: Splitter & Sensor | Keys 1-6, D');
            console.log('  Levels: Beginner → Expert | Par scores | Special rules');
        })();
    </script>
</body>
</html>
