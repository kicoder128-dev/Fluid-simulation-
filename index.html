<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydro-Logic: Fluid Automation Puzzle</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel: #16213e;
            --highlight: #e94560;
            --text: #e0e0e0;
            --gold: #f0c040;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .game-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .grid-container {
            position: relative;
            background: #0a0a1a;
            border: 3px solid #333;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(233, 68, 96, 0.2);
        }

        canvas {
            display: block;
            cursor: crosshair;
            width: 480px;
            height: 320px;
        }

        .panel {
            background: var(--panel);
            border-radius: 12px;
            padding: 20px;
            min-width: 280px;
            max-width: 320px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #2a2a4a;
        }

        .panel h2 {
            font-size: 1.3em;
            margin-bottom: 12px;
            color: var(--highlight);
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 2px solid #2a2a4a;
            padding-bottom: 8px;
        }

        .tool-section h3 {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #888;
            margin-bottom: 8px;
        }

        .tool-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tool-btn {
            padding: 8px 12px;
            border: 2px solid #444;
            background: #1a1a30;
            color: #ccc;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8em;
            font-family: inherit;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tool-btn:hover {
            border-color: #888;
            background: #222240;
        }
        .tool-btn.active {
            border-color: var(--highlight);
            background: #2a1a30;
            color: #fff;
            box-shadow: 0 0 12px rgba(233, 68, 96, 0.4);
        }
        .tool-btn.delete-btn {
            border-color: #c0392b;
            color: #e74c3c;
        }
        .tool-btn.delete-btn.active {
            background: #3a1010;
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.5);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-family: inherit;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.2s;
            width: 100%;
            margin-top: 6px;
        }

        .btn-run {
            background: #27ae60;
            color: white;
        }
        .btn-run:hover {
            background: #2ecc71;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.4);
        }
        .btn-run.running {
            background: #e74c3c;
            animation: pulse 0.8s infinite;
        }
        .btn-reset {
            background: #555;
            color: white;
        }
        .btn-reset:hover {
            background: #777;
        }

        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
            }
            50% {
                box-shadow: 0 0 30px rgba(231, 76, 60, 0.9);
            }
        }

        .level-info {
            background: #111130;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid var(--gold);
        }
        .level-info h3 {
            color: var(--gold);
            margin-bottom: 4px;
            font-size: 1em;
        }
        .level-info p {
            font-size: 0.85em;
            color: #aaa;
            line-height: 1.5;
        }

        .status {
            font-size: 0.85em;
            color: #888;
            margin-top: 8px;
            text-align: center;
            min-height: 24px;
            padding: 4px;
            border-radius: 4px;
        }
        .status.success {
            color: #2ecc71;
            font-weight: bold;
            background: #0a2a0a;
        }
        .status.fail {
            color: #e74c3c;
            font-weight: bold;
            background: #2a0a0a;
        }

        .legend {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 0.75em;
            color: #aaa;
            margin-top: 12px;
        }
        .legend span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .legend .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-area">
            <div class="grid-container">
                <canvas id="gridCanvas"></canvas>
            </div>
            <div class="status" id="status">Click grid to place tubes. Connect inputs → outputs.</div>
        </div>

        <div class="panel">
            <h2>⚙️ Hydro-Logic</h2>

            <div class="level-info" id="levelInfo">
                <h3>Level 1: Simple Route</h3>
                <p>🔵 Blue Input → 🔵 Blue Output<br>Connect them with tubes.</p>
            </div>

            <div class="tool-section">
                <h3>🔧 Place Tool (keys 1-4, D)</h3>
                <div class="tool-buttons" id="toolButtons">
                    <button class="tool-btn active" data-tool="tube">1: Tube</button>
                    <button class="tool-btn" data-tool="valve">2: Valve</button>
                    <button class="tool-btn" data-tool="mixer">3: Mixer</button>
                    <button class="tool-btn" data-tool="delay">4: Delay</button>
                    <button class="tool-btn delete-btn" data-tool="delete">D: Delete</button>
                </div>
            </div>

            <button class="btn btn-run" id="btnRun">▶ Run Simulation (Space)</button>
            <button class="btn btn-reset" id="btnReset">↺ Clear All (R)</button>

            <div style="margin-top:10px; display:flex; gap:8px;">
                <button class="btn btn-reset" id="btnPrev" style="flex:1;">◀ Prev</button>
                <button class="btn btn-reset" id="btnNext" style="flex:1;">Next ▶</button>
            </div>

            <div class="legend">
                <span><span class="dot" style="background:#4a90d9;"></span> Blue</span>
                <span><span class="dot" style="background:#e74c3c;"></span> Red</span>
                <span><span class="dot" style="background:#8e44ad;"></span> Purple</span>
                <span><span class="dot" style="background:#2ecc71;"></span> Green</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== GAME ENGINE ====================
            const canvas = document.getElementById('gridCanvas');
            const ctx = canvas.getContext('2d');
            const statusEl = document.getElementById('status');
            const btnRun = document.getElementById('btnRun');
            const btnReset = document.getElementById('btnReset');
            const btnPrev = document.getElementById('btnPrev');
            const btnNext = document.getElementById('btnNext');
            const levelInfo = document.getElementById('levelInfo');
            const toolButtons = document.getElementById('toolButtons');

            const CELL_SIZE = 40;
            const GRID_COLS = 12;
            const GRID_ROWS = 8;

            // Set actual canvas size (not CSS size)
            canvas.width = GRID_COLS * CELL_SIZE;
            canvas.height = GRID_ROWS * CELL_SIZE;

            // --- State ---
            let currentTool = 'tube';
            let isRunning = false;
            let simulationInterval = null;
            let currentLevelIndex = 0;
            let grid = [];
            let fluidParticles = [];
            let simTick = 0;

            // --- Level Definitions ---
            const levels = [{
                name: 'Level 1: Simple Route',
                description: '🔵 Blue Input → 🔵 Blue Output<br>Connect them with tubes.',
                inputs: [{ row: 3, col: 0, color: 'blue', pressure: 'continuous' }],
                outputs: [{ row: 3, col: 11, color: 'blue', required: 'blue' }],
            }, {
                name: 'Level 2: Mix Colors',
                description: '🔵 Blue + 🔴 Red → 🟣 Purple Output<br>Use a Mixer to combine them.',
                inputs: [
                    { row: 1, col: 0, color: 'blue', pressure: 'continuous' },
                    { row: 5, col: 0, color: 'red', pressure: 'continuous' },
                ],
                outputs: [{ row: 3, col: 11, color: 'purple', required: 'purple' }],
            }, {
                name: 'Level 3: Keep Separate',
                description: '🔵 Blue → Blue Output<br>🔴 Red → Red Output<br>Keep them separate!',
                inputs: [
                    { row: 1, col: 0, color: 'blue', pressure: 'continuous' },
                    { row: 5, col: 0, color: 'red', pressure: 'continuous' },
                ],
                outputs: [
                    { row: 1, col: 11, color: 'blue', required: 'blue' },
                    { row: 5, col: 11, color: 'red', required: 'red' },
                ],
            }, {
                name: 'Level 4: The Purple Drop',
                description: '🔵 Blue (continuous) + 🔴 Red (pulses)<br>→ 🟣 Purple Output<br>Time it right! Red pulses every few ticks.',
                inputs: [
                    { row: 1, col: 0, color: 'blue', pressure: 'continuous' },
                    { row: 5, col: 0, color: 'red', pressure: 'intermittent', interval: 3 },
                ],
                outputs: [{ row: 3, col: 11, color: 'purple', required: 'purple' }],
            }, {
                name: 'Level 5: Delay Buffer',
                description: '🔵 Blue (pulses) → 🟦 Delay Tank → 🔵 Output<br>Use a Delay Tank to smooth the output.',
                inputs: [{ row: 3, col: 0, color: 'blue', pressure: 'intermittent', interval: 2 }],
                outputs: [{ row: 3, col: 11, color: 'blue', required: 'blue' }],
            }, ];

            // --- Grid Functions ---
            function createEmptyGrid() {
                const g = [];
                for (let r = 0; r < GRID_ROWS; r++) {
                    g[r] = [];
                    for (let c = 0; c < GRID_COLS; c++) {
                        g[r][c] = null;
                    }
                }
                return g;
            }

            function setupLevel(levelIndex) {
                currentLevelIndex = levelIndex;
                const level = levels[levelIndex];
                grid = createEmptyGrid();
                stopSimulation();
                fluidParticles = [];
                simTick = 0;
                statusEl.textContent = 'Click grid to place tubes. Connect inputs → outputs.';
                statusEl.className = 'status';

                // Place inputs
                level.inputs.forEach(inp => {
                    grid[inp.row][inp.col] = {
                        type: 'input',
                        color: inp.color,
                        pressure: inp.pressure,
                        interval: inp.interval || 2,
                        tickCounter: 0,
                        active: inp.pressure === 'continuous',
                        connections: getEdgeConnections(inp.row, inp.col),
                    };
                });

                // Place outputs
                level.outputs.forEach(out => {
                    grid[out.row][out.col] = {
                        type: 'output',
                        color: out.required,
                        required: out.required,
                        received: null,
                        connections: getEdgeConnections(out.row, out.col),
                    };
                });

                levelInfo.innerHTML =
                    `<h3>${level.name}</h3><p>${level.description.replace(/\n/g, '<br>')}</p>`;
                updateAllConnections();
                draw();
            }

            function getEdgeConnections(row, col) {
                const conns = [];
                if (row > 0) conns.push('n');
                if (row < GRID_ROWS - 1) conns.push('s');
                if (col > 0) conns.push('w');
                if (col < GRID_COLS - 1) conns.push('e');
                return conns;
            }

            function resetGrid() {
                setupLevel(currentLevelIndex);
            }

            // --- Drawing ---
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Grid lines
                ctx.strokeStyle = '#1a1a35';
                ctx.lineWidth = 0.5;
                for (let r = 0; r <= GRID_ROWS; r++) {
                    ctx.beginPath();
                    ctx.moveTo(0, r * CELL_SIZE);
                    ctx.lineTo(canvas.width, r * CELL_SIZE);
                    ctx.stroke();
                }
                for (let c = 0; c <= GRID_COLS; c++) {
                    ctx.beginPath();
                    ctx.moveTo(c * CELL_SIZE, 0);
                    ctx.lineTo(c * CELL_SIZE, canvas.height);
                    ctx.stroke();
                }

                // Draw cells
                for (let r = 0; r < GRID_ROWS; r++) {
                    for (let c = 0; c < GRID_COLS; c++) {
                        const cell = grid[r][c];
                        const x = c * CELL_SIZE;
                        const y = r * CELL_SIZE;

                        if (!cell) continue;

                        if (cell.type === 'input') {
                            drawInputOutput(x, y, cell.color, true);
                        } else if (cell.type === 'output') {
                            drawInputOutput(x, y, cell.color, false);
                        } else if (cell.type === 'tube') {
                            drawTube(x, y, cell);
                        } else if (cell.type === 'valve') {
                            drawValve(x, y, cell);
                        } else if (cell.type === 'mixer') {
                            drawMixer(x, y, cell);
                        } else if (cell.type === 'delay') {
                            drawDelay(x, y, cell);
                        }
                    }
                }

                // Draw fluid particles
                if (isRunning && fluidParticles.length > 0) {
                    fluidParticles.forEach(p => {
                        const px = p.col * CELL_SIZE + CELL_SIZE / 2;
                        const py = p.row * CELL_SIZE + CELL_SIZE / 2;
                        ctx.fillStyle = getColorHex(p.color);
                        ctx.globalAlpha = 0.9;
                        ctx.beginPath();
                        ctx.arc(px, py, 7, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    });
                }
            }

            function drawInputOutput(x, y, color, isInput) {
                const cx = x + CELL_SIZE / 2;
                const cy = y + CELL_SIZE / 2;
                const r = 14;

                ctx.fillStyle = '#1a1a30';
                ctx.strokeStyle = getColorHex(color);
                ctx.lineWidth = 3;
                ctx.beginPath();
                if (isInput) {
                    ctx.moveTo(cx, cy - r);
                    ctx.lineTo(cx + r, cy);
                    ctx.lineTo(cx, cy + r);
                    ctx.lineTo(cx - r, cy);
                    ctx.closePath();
                } else {
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                }
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = getColorHex(color);
                ctx.globalAlpha = 0.7;
                ctx.beginPath();
                if (isInput) {
                    ctx.moveTo(cx, cy - r + 4);
                    ctx.lineTo(cx + r - 4, cy);
                    ctx.lineTo(cx, cy + r - 4);
                    ctx.lineTo(cx - r + 4, cy);
                    ctx.closePath();
                } else {
                    ctx.arc(cx, cy, r - 4, 0, Math.PI * 2);
                }
                ctx.fill();
                ctx.globalAlpha = 1;

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 9px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(isInput ? 'IN' : 'OUT', cx, cy);
            }

            function drawTube(x, y, cell) {
                const cx = x + CELL_SIZE / 2;
                const cy = y + CELL_SIZE / 2;
                const conns = cell.connections || [];

                ctx.strokeStyle = '#5a7a9a';
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                conns.forEach(dir => {
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    if (dir === 'n') ctx.lineTo(cx, y - 2);
                    if (dir === 's') ctx.lineTo(cx, y + CELL_SIZE + 2);
                    if (dir === 'e') ctx.lineTo(x + CELL_SIZE + 2, cy);
                    if (dir === 'w') ctx.lineTo(x - 2, cy);
                    ctx.stroke();
                });

                ctx.fillStyle = '#3a5a7a';
                ctx.beginPath();
                ctx.arc(cx, cy, 5, 0, Math.PI * 2);
                ctx.fill();

                if (isRunning && cell._hasFluid) {
                    ctx.fillStyle = getColorHex(cell._fluidColor || 'blue');
                    ctx.globalAlpha = 0.8;
                    ctx.beginPath();
                    ctx.arc(cx, cy, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }

            function drawValve(x, y, cell) {
                const cx = x + CELL_SIZE / 2;
                const cy = y + CELL_SIZE / 2;

                ctx.fillStyle = '#2a1a1a';
                ctx.fillRect(x + 4, y + 4, CELL_SIZE - 8, CELL_SIZE - 8);
                ctx.strokeStyle = cell.state === 'open' ? '#2ecc71' : '#e74c3c';
                ctx.lineWidth = 2;
                ctx.strokeRect(x + 4, y + 4, CELL_SIZE - 8, CELL_SIZE - 8);

                ctx.fillStyle = cell.state === 'open' ? '#2ecc71' : '#e74c3c';
                ctx.beginPath();
                ctx.moveTo(cx, cy - 10);
                ctx.lineTo(cx + 8, cy + 6);
                ctx.lineTo(cx - 8, cy + 6);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.font = '8px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(cell.state === 'open' ? 'ON' : 'OFF', cx, cy + 16);
            }

            function drawMixer(x, y, cell) {
                const cx = x + CELL_SIZE / 2;
                const cy = y + CELL_SIZE / 2;

                ctx.fillStyle = '#1a1a2a';
                ctx.beginPath();
                ctx.arc(cx, cy, 14, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#8e44ad';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(cx - 6, cy);
                ctx.lineTo(cx + 6, cy);
                ctx.moveTo(cx, cy - 6);
                ctx.lineTo(cx, cy + 6);
                ctx.stroke();

                ctx.fillStyle = '#fff';
                ctx.font = '7px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('MIX', cx, cy + 17);
            }

            function drawDelay(x, y, cell) {
                const cx = x + CELL_SIZE / 2;
                const cy = y + CELL_SIZE / 2;

                ctx.fillStyle = '#1a2a1a';
                ctx.fillRect(x + 3, y + 3, CELL_SIZE - 6, CELL_SIZE - 6);
                ctx.strokeStyle = '#f0c040';
                ctx.lineWidth = 2;
                ctx.strokeRect(x + 3, y + 3, CELL_SIZE - 6, CELL_SIZE - 6);

                const capacity = cell.capacity || 3;
                const stored = cell.stored || 0;
                const fillHeight = (stored / capacity) * (CELL_SIZE - 14);
                ctx.fillStyle = '#f0c040';
                ctx.globalAlpha = 0.6;
                ctx.fillRect(x + 8, y + CELL_SIZE - 10 - fillHeight, CELL_SIZE - 16, fillHeight);
                ctx.globalAlpha = 1;

                ctx.fillStyle = '#fff';
                ctx.font = '8px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`${stored}/${capacity}`, cx, cy);
            }

            function getColorHex(color) {
                const map = {
                    'blue': '#4a90d9',
                    'red': '#e74c3c',
                    'purple': '#8e44ad',
                    'green': '#2ecc71',
                    'yellow': '#f0c040',
                    'orange': '#e67e22',
                };
                return map[color] || '#888';
            }

            function mixColors(c1, c2) {
                if (!c1 || !c2) return c1 || c2;
                const pair = [c1, c2].sort().join(',');
                const mixes = {
                    'blue,red': 'purple',
                    'blue,yellow': 'green',
                    'red,yellow': 'orange',
                };
                return mixes[pair] || c1;
            }

            // --- Mouse Interaction ---
            canvas.addEventListener('click', function(e) {
                if (isRunning) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;
                const col = Math.floor(x / CELL_SIZE);
                const row = Math.floor(y / CELL_SIZE);

                if (col < 0 || col >= GRID_COLS || row < 0 || row >= GRID_ROWS) return;

                const cell = grid[row][col];
                if (cell && (cell.type === 'input' || cell.type === 'output')) return;

                if (currentTool === 'delete') {
                    grid[row][col] = null;
                } else if (currentTool === 'tube') {
                    if (cell && cell.type === 'tube') {
                        grid[row][col] = null;
                    } else {
                        grid[row][col] = { type: 'tube', connections: [] };
                    }
                } else if (currentTool === 'valve') {
                    grid[row][col] = { type: 'valve', state: 'open', connections: [] };
                } else if (currentTool === 'mixer') {
                    grid[row][col] = { type: 'mixer', connections: [] };
                } else if (currentTool === 'delay') {
                    grid[row][col] = { type: 'delay', capacity: 3, stored: 0, connections: [] };
                }

                updateAllConnections();
                draw();
            });

            // --- Connection Logic ---
            function updateAllConnections() {
                for (let r = 0; r < GRID_ROWS; r++) {
                    for (let c = 0; c < GRID_COLS; c++) {
                        const cell = grid[r][c];
                        if (cell && cell.type !== 'input' && cell.type !== 'output') {
                            cell.connections = [];
                        }
                    }
                }

                const visited = new Set();
                for (let r = 0; r < GRID_ROWS; r++) {
                    for (let c = 0; c < GRID_COLS; c++) {
                        const key = `${r},${c}`;
                        if (visited.has(key)) continue;
                        const cell = grid[r][c];
                        if (!cell) continue;
                        if (['input', 'output', 'tube', 'valve', 'mixer', 'delay'].includes(cell.type)) {
                            const queue = [{ r, c }];
                            const compVisited = new Set();
                            compVisited.add(key);
                            while (queue.length > 0) {
                                const { r: cr, c: cc } = queue.shift();
                                const dirs = [
                                    { dr: -1, dc: 0, dir: 'n', opp: 's' },
                                    { dr: 1, dc: 0, dir: 's', opp: 'n' },
                                    { dr: 0, dc: -1, dir: 'w', opp: 'e' },
                                    { dr: 0, dc: 1, dir: 'e', opp: 'w' },
                                ];
                                for (const { dr, dc, dir, opp } of dirs) {
                                    const nr = cr + dr;
                                    const nc = cc + dc;
                                    if (nr >= 0 && nr < GRID_ROWS && nc >= 0 && nc < GRID_COLS) {
                                        const nkey = `${nr},${nc}`;
                                        if (compVisited.has(nkey)) continue;
                                        const ncell = grid[nr][nc];
                                        if (ncell && ['input', 'output', 'tube', 'valve', 'mixer', 'delay'].includes(
                                                ncell.type)) {
                                            compVisited.add(nkey);
                                            queue.push({ r: nr, c: nc });
                                            if (grid[cr][cc].connections && !grid[cr][cc].connections.includes(dir)) {
                                                grid[cr][cc].connections.push(dir);
                                            }
                                            if (grid[nr][nc].connections && !grid[nr][nc].connections.includes(opp)) {
                                                grid[nr][nc].connections.push(opp);
                                            }
                                        }
                                    }
                                }
                            }
                            for (const k of compVisited) visited.add(k);
                        }
                    }
                }
            }

            // --- Simulation ---
            function toggleRun() {
                if (isRunning) {
                    stopSimulation();
                } else {
                    startSimulation();
                }
            }

            function startSimulation() {
                updateAllConnections();
                isRunning = true;
                btnRun.textContent = '⏹ Stop (Space)';
                btnRun.classList.add('running');
                statusEl.textContent = 'Simulation running...';
                statusEl.className = 'status';
                resetSimulationState();
                fluidParticles = [];
                simTick = 0;
                simulationInterval = setInterval(simulateTick, 400);
            }

            function stopSimulation() {
                isRunning = false;
                if (simulationInterval) {
                    clearInterval(simulationInterval);
                    simulationInterval = null;
                }
                btnRun.textContent = '▶ Run Simulation (Space)';
                btnRun.classList.remove('running');
                fluidParticles = [];
                checkWinCondition();
                draw();
            }

            function resetSimulationState() {
                for (let r = 0; r < GRID_ROWS; r++) {
                    for (let c = 0; c < GRID_COLS; c++) {
                        const cell = grid[r][c];
                        if (cell) {
                            cell._hasFluid = false;
                            cell._fluidColor = null;
                            if (cell.type === 'delay') cell.stored = 0;
                            if (cell.type === 'valve') cell.state = 'open';
                            if (cell.type === 'output') cell.received = null;
                        }
                    }
                }
            }

            function simulateTick() {
                simTick++;
                const level = levels[currentLevelIndex];

                // Update inputs
                level.inputs.forEach(inp => {
                    const cell = grid[inp.row][inp.col];
                    if (!cell) return;
                    if (inp.pressure === 'continuous') {
                        cell.active = true;
                    } else {
                        cell.tickCounter = (cell.tickCounter || 0) + 1;
                        const interval = inp.interval || 2;
                        cell.active = (cell.tickCounter % (interval * 2)) < interval;
                    }
                });

                // Reset fluid state
                for (let r = 0; r < GRID_ROWS; r++) {
                    for (let c = 0; c < GRID_COLS; c++) {
                        const cell = grid[r][c];
                        if (cell && cell.type !== 'input') {
                            cell._hasFluid = false;
                            cell._fluidColor = null;
                        }
                        if (cell && cell.type === 'output') {
                            cell.received = null;
                        }
                    }
                }

                const newParticles = [];
                const processed = new Set();

                // Propagate from inputs
                for (const inp of level.inputs) {
                    const cell = grid[inp.row][inp.col];
                    if (!cell || !cell.active) continue;
                    const startKey = `${inp.row},${inp.col}`;
                    if (processed.has(startKey)) continue;
                    processed.add(startKey);

                    cell._hasFluid = true;
                    cell._fluidColor = inp.color;
                    newParticles.push({ row: inp.row, col: inp.col, color: inp.color });

                    const queue = [{ r: inp.row, c: inp.col, color: inp.color }];
                    const visited = new Set();
                    visited.add(startKey);

                    while (queue.length > 0) {
                        const { r, c, color } = queue.shift();
                        const cell = grid[r][c];
                        if (!cell) continue;

                        if (cell.type === 'output') {
                            cell.received = color;
                            newParticles.push({ row: r, col: c, color });
                            continue;
                        }

                        if (cell.type === 'valve' && cell.state === 'closed') continue;

                        if (cell.type === 'mixer') {
                            const incomingColors = [];
                            for (const dir of cell.connections) {
                                const nb = getNeighbor(r, c, dir);
                                if (nb && grid[nb.r][nb.c] && grid[nb.r][nb.c]._hasFluid && grid[nb.r][nb.c]
                                    ._fluidColor) {
                                    incomingColors.push(grid[nb.r][nb.c]._fluidColor);
                                }
                            }
                            const uniqueColors = [...new Set(incomingColors)];
                            if (uniqueColors.length >= 2) {
                                const mixed = mixColors(uniqueColors[0], uniqueColors[1]);
                                cell._fluidColor = mixed;
                                for (const dir of cell.connections) {
                                    const nb = getNeighbor(r, c, dir);
                                    if (nb && !visited.has(`${nb.r},${nb.c}`)) {
                                        visited.add(`${nb.r},${nb.c}`);
                                        queue.push({ r: nb.r, c: nb.c, color: mixed });
                                        if (grid[nb.r][nb.c]) {
                                            grid[nb.r][nb.c]._hasFluid = true;
                                            grid[nb.r][nb.c]._fluidColor = mixed;
                                        }
                                        newParticles.push({ row: nb.r, col: nb.c, color: mixed });
                                    }
                                }
                                continue;
                            }
                        }

                        if (cell.type === 'delay') {
                            if (cell.stored < cell.capacity) {
                                cell.stored++;
                                cell._fluidColor = color;
                                newParticles.push({ row: r, col: c, color });
                                continue;
                            }
                            cell.stored = cell.capacity;
                        }

                        for (const dir of cell.connections) {
                            const nb = getNeighbor(r, c, dir);
                            if (nb && !visited.has(`${nb.r},${nb.c}`)) {
                                const ncell = grid[nb.r][nb.c];
                                if (ncell && ncell.type !== 'input') {
                                    visited.add(`${nb.r},${nb.c}`);
                                    queue.push({ r: nb.r, c: nb.c, color: cell._fluidColor || color });
                                    ncell._hasFluid = true;
                                    ncell._fluidColor = cell._fluidColor || color;
                                    newParticles.push({ row: nb.r, col: nb.c, color: cell._fluidColor || color });
                                }
                            }
                        }
                    }
                }

                fluidParticles = newParticles;
                draw();

                if (simTick % 3 === 0) {
                    checkWinCondition();
                }
            }

            function getNeighbor(r, c, dir) {
                switch (dir) {
                    case 'n':
                        return r > 0 ? { r: r - 1, c } : null;
                    case 's':
                        return r < GRID_ROWS - 1 ? { r: r + 1, c } : null;
                    case 'e':
                        return c < GRID_COLS - 1 ? { r, c: c + 1 } : null;
                    case 'w':
                        return c > 0 ? { r, c: c - 1 } : null;
                    default:
                        return null;
                }
            }

            function checkWinCondition() {
                const level = levels[currentLevelIndex];
                let allCorrect = true;
                let anyReceived = false;

                for (const out of level.outputs) {
                    const cell = grid[out.row][out.col];
                    if (!cell || !cell.received) {
                        allCorrect = false;
                    } else if (cell.received === out.required) {
                        anyReceived = true;
                    } else {
                        allCorrect = false;
                    }
                }

                if (allCorrect && anyReceived) {
                    statusEl.textContent = '✅ SUCCESS! Correct output achieved!';
                    statusEl.className = 'status success';
                } else if (anyReceived && !allCorrect) {
                    statusEl.textContent = '⚠️ Contamination! Wrong color at output.';
                    statusEl.className = 'status fail';
                }
            }

            // --- Tool Selection ---
            toolButtons.addEventListener('click', function(e) {
                const btn = e.target.closest('.tool-btn');
                if (!btn) return;
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
            });

            // --- Button Events ---
            btnRun.addEventListener('click', toggleRun);
            btnReset.addEventListener('click', resetGrid);
            btnPrev.addEventListener('click', function() {
                const idx = (currentLevelIndex - 1 + levels.length) % levels.length;
                setupLevel(idx);
            });
            btnNext.addEventListener('click', function() {
                const idx = (currentLevelIndex + 1) % levels.length;
                setupLevel(idx);
            });

            // --- Keyboard Shortcuts ---
            document.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

                switch (e.key.toLowerCase()) {
                    case '1':
                        currentTool = 'tube';
                        break;
                    case '2':
                        currentTool = 'valve';
                        break;
                    case '3':
                        currentTool = 'mixer';
                        break;
                    case '4':
                        currentTool = 'delay';
                        break;
                    case 'd':
                        currentTool = 'delete';
                        break;
                    case ' ':
                        e.preventDefault();
                        toggleRun();
                        return;
                    case 'r':
                        if (!isRunning) resetGrid();
                        return;
                    default:
                        return;
                }
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                const btn = document.querySelector(`[data-tool="${currentTool}"]`);
                if (btn) btn.classList.add('active');
            });

            // --- Initialize ---
            setupLevel(0);
            draw();

            console.log('🔧 Hydro-Logic ready!');
            console.log('  Click grid to place components');
            console.log('  Keys: 1=Tube 2=Valve 3=Mixer 4=Delay D=Delete');
            console.log('  Space=Run/Stop  R=Reset');
            console.log('  Connect blue+red through a mixer to make purple!');
        })();
    </script>
</body>
</html>
